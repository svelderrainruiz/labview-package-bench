name: Verify docker-windows (manual)

# Heavy, opt-in verification of the docker-windows image on a real Windows
# runner: it derives the VIPM-enabled LabVIEW Windows image and validates VIPM
# Pro activation + refresh inside the container using repository secrets. It is
# manual (workflow_dispatch) because it pulls NI's multi-GB LabVIEW image and
# requires a VIPM Pro serial.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   VIPM_SERIAL_NUMBER, VIPM_FULL_NAME, VIPM_EMAIL
# These replace the local docker/windows/.env for CI. They are forwarded into
# the container by name only, so the serial never appears on a command line.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-docker-windows:
    name: Build image + activate VIPM Pro in container
    # Pin to Windows Server 2022 (ltsc2022, kernel 10.0.20348). NI's LabVIEW
    # Windows image is Server Core ltsc2022, so a 2022 host runs it with native
    # process isolation. `windows-latest` now maps to Server 2025, which forces
    # slower/less-reliable Hyper-V isolation (or a version-mismatch failure) for
    # an ltsc2022 container; the 2022 runner also pre-caches the ltsc2022 bases.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch VIPM installer
        run: node scripts/fetchVipmInstaller.js
      - name: Build docker-windows image
        run: >
          docker build -t labview-package-bench-windows:latest
          --build-arg LABVIEW_IMAGE=nationalinstruments/labview:latest-windows
          docker/windows
      - name: Verify VIPM CLI is installed
        run: >
          docker run --rm --entrypoint powershell labview-package-bench-windows:latest
          -NoProfile -Command "vipm --version"
      - name: Activate VIPM Pro and refresh in the container
        env:
          VIPM_SERIAL_NUMBER: ${{ secrets.VIPM_SERIAL_NUMBER }}
          VIPM_FULL_NAME: ${{ secrets.VIPM_FULL_NAME }}
          VIPM_EMAIL: ${{ secrets.VIPM_EMAIL }}
        # Single-quote the -Command payload so the *outer* Actions pwsh passes it
        # through literally. The container's powershell then expands $env:* (the
        # secrets, forwarded by name) and $LASTEXITCODE. Double quotes made the
        # outer shell expand them early, splitting the spaced VIPM_FULL_NAME into
        # a stray argument and nulling $LASTEXITCODE.
        run: >
          docker run --rm -e VIPM_SERIAL_NUMBER -e VIPM_FULL_NAME -e VIPM_EMAIL
          --entrypoint powershell labview-package-bench-windows:latest
          -NoProfile -Command 'vipm activate --serial-number $env:VIPM_SERIAL_NUMBER --name $env:VIPM_FULL_NAME --email $env:VIPM_EMAIL; if ($LASTEXITCODE -ne 0) { exit 1 }; vipm refresh'
